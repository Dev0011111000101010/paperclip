name: Block Forbidden Commit Messages

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check-commit-messages:
    name: Check commit messages for forbidden patterns
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMITS=$(git log --format="%B" origin/${{ github.base_ref }}..HEAD)
          else
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              COMMITS=$(git log --format="%B" -5)
            else
              COMMITS=$(git log --format="%B" ${{ github.event.before }}..${{ github.event.after }})
            fi
          fi

          echo "=== Checking commit messages ==="
          FORBIDDEN=0

          if echo "$COMMITS" | grep -q '@'; then
            echo "FAIL: contains '@'"
            FORBIDDEN=1
          fi

          if echo "$COMMITS" | grep -qi 'co-author'; then
            echo "FAIL: contains 'Co-Author'"
            FORBIDDEN=1
          fi

          if echo "$COMMITS" | grep -qi 'author'; then
            echo "FAIL: contains 'Author'"
            FORBIDDEN=1
          fi

          if echo "$COMMITS" | grep -qi 'автор'; then
            echo "FAIL: contains 'Автор/автор'"
            FORBIDDEN=1
          fi

          if [ "$FORBIDDEN" -eq 1 ]; then
            echo "Push rejected: forbidden pattern in commit message"
            exit 1
          fi

          echo "OK: All commit messages are clean."
